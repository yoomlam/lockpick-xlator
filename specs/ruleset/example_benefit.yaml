# Example Benefit Program - CIVIL DSL Format
# This demonstrates a federal housing assistance eligibility module

module: "eligibility.example_benefit"
description: "Example benefit eligibility rules - demonstrates CIVIL DSL structure"
version: "2026Q1"
jurisdiction:
  level: federal
  country: US

effective:
  start: 2026-01-01
  end: 2026-03-31

# Input facts schema
facts:
  Applicant:
    fields:
      age:
        type: int
        description: "Applicant's age in years"
      monthly_income:
        type: money
        currency: USD
        description: "Gross monthly income"
      household_size:
        type: int
        description: "Number of people in household"

# Output decisions schema
decisions:
  eligible:
    type: bool
    default: false
    description: "Whether applicant is eligible for benefits"
  reasons:
    type: list
    item: Reason
    default: []
    description: "List of reasons for eligibility decision"

# Custom types
types:
  Reason:
    fields:
      code:
        type: string
        description: "Machine-readable reason code"
      message:
        type: string
        description: "Human-readable explanation"
      citations:
        type: list
        item: Citation
        description: "Legal citations supporting this reason"

  Citation:
    fields:
      label:
        type: string
        description: "Citation reference (e.g., '42 USC § 1437a')"
      url:
        type: string
        optional: true
        description: "URL to policy document"
      excerpt:
        type: string
        optional: true
        description: "Brief excerpt from policy"

# Constants
constants:
  MIN_AGE: 18
  HOUSEHOLD_MIN: 1
  FEDERAL_POVERTY_LEVEL: 14580  # Annual FPL for 1-person household (example)
  INCOME_MULTIPLIER: 1.5

# Income limit table by household size
tables:
  income_limit_by_household:
    key: [household_size]
    value: [max_monthly_income]
    rows:
      - { household_size: 1, max_monthly_income: 1823 }  # FPL * 1.5 / 12
      - { household_size: 2, max_monthly_income: 2465 }
      - { household_size: 3, max_monthly_income: 3108 }
      - { household_size: 4, max_monthly_income: 3750 }
      - { household_size: 5, max_monthly_income: 4393 }

# Rule set with precedence strategy
rule_set:
  name: "federal_benefit_eligibility"
  precedence: "deny_overrides_allow"
  description: "Federal eligibility rules for example benefit program"

rules:
  # Denial rules - checked first
  - id: "FED-HOUSEHOLD-MIN"
    kind: "deny"
    priority: 1
    when: "Applicant.household_size < HOUSEHOLD_MIN"
    then:
      - add_reason:
          code: "HOUSEHOLD_SIZE_INVALID"
          message: "Household size must be at least 1"
          citations:
            - label: "Program Policy Manual Section 2.1"
              excerpt: "Household size must be a positive integer"

  - id: "FED-MIN-AGE"
    kind: "deny"
    priority: 1
    when: "Applicant.age < MIN_AGE"
    then:
      - add_reason:
          code: "AGE_REQUIREMENT_NOT_MET"
          message: "Applicant must be at least 18 years old"
          citations:
            - label: "Program Policy Manual Section 2.1"
              excerpt: "Applicants must be 18 years of age or older"

  - id: "FED-INCOME-LIMIT"
    kind: "deny"
    priority: 2
    when: "Applicant.monthly_income > table('income_limit_by_household', Applicant.household_size).max_monthly_income"
    then:
      - add_reason:
          code: "INCOME_TOO_HIGH"
          message: "Monthly income exceeds the limit for household size"
          citations:
            - label: "Federal Register 42 CFR 435.4"
              excerpt: "Income must not exceed 150% of federal poverty level"

  # Allow rule - if no denials, applicant is eligible
  - id: "FED-ALLOW"
    kind: "allow"
    priority: 100
    when: "true"
    then:
      - set:
          eligible: true
      - add_reason:
          code: "MEETS_ALL_REQUIREMENTS"
          message: "Applicant meets all eligibility requirements"
          citations:
            - label: "Program Policy Manual Section 2.1"
