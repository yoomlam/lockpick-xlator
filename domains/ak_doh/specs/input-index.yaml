sections:
  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "## 523 MEDICAID EXCEPTIONS TO APA INCOME POLICY"
    summary: "Introduces Medicaid income determination rules for the ADLTC program, noting that APA income policy applies except as specified in the subsections below."
    tags: [Medicaid, income determination, APA exceptions, ADLTC]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 A. SOCIAL SECURITY BENEFITS"
    summary: "Social Security COLA increases are disregarded for certain grandfathered individuals under Medicaid Pickle and grandfathered eligibility provisions."
    tags: [Social Security, COLA, grandfathered, income disregard]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 B. REASONABLE COMPATIBILITY"
    summary: "Defines the 10% reasonable compatibility standard for reconciling client-stated earned income against DOL electronic data when determining Medicaid income eligibility."
    tags: [reasonable compatibility, earned income, DOL verification, income discrepancy]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 C. POST-ELIGIBILITY DETERMINATION"
    summary: "SSI benefits are disregarded during the first two months of institutionalization in the post-eligibility determination for individuals eligible under Social Security Act sections 1619(a) or (b)."
    tags: [post-eligibility, SSI, institutionalization, income disregard]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 D. COST-OF-CARE DETERMINATION"
    summary: "Specifies income disregards and inclusions for the post-eligibility cost-of-care determination, including treatment of SSA overpayment withholding, Alaska Senior Benefits Program payments, and federal tax returns."
    tags: [cost of care, post-eligibility, SSA, income disregard, long-term care]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 E. VETERANS AFFAIRS PAYMENTS"
    summary: "VA payments up to $200 per month are excluded from income in post-eligibility computations for Medicaid recipients residing in state Veterans' Homes or institutional facilities."
    tags: [Veterans Affairs, income exclusion, post-eligibility, institutional care]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 F. INCOME DISREGARDS"
    summary: "Standard income disregards including the $20 general disregard do not apply to Special Long Term Care applicants, and describes spousal income deeming rules during institutionalization."
    tags: [income disregards, Special Long Term Care, spousal deeming, institutional care]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 G. FEDERAL POVERTY GUIDELINES FOR ALASKA"
    summary: "Federal Poverty Guidelines for Alaska replace APA standards when determining eligibility for QMB, SLMB, and QDWI Medicaid categories."
    tags: [Federal Poverty Guidelines, QMB, SLMB, QDWI, Medicaid eligibility]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 H. IN-KIND SUPPORT AND MAINTENANCE"
    summary: "The APA in-kind support and maintenance income policy does not apply when determining eligibility for the Special Long Term Care category."
    tags: [in-kind support, Special Long Term Care, income exclusion, Medicaid]

  - path: "input/policy_docs/adltc_manual/523 MEDICAID EXCEPTIONS TO APA INCOME POLICY.md"
    heading: "### 523 I. INDIVIDUAL INDIAN MONEY ACCOUNTS"
    summary: "Funds deposited or held in Individual Indian Money (IIM) accounts are excluded as income for Medicaid eligibility purposes."
    tags: [Individual Indian Money, IIM, income exclusion, Alaska Native]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 MEDICAID EXCEPTIONS TO APA RESOURCE POLICY"
    summary: "Introduces Medicaid resource determination rules for the ADLTC program, noting that APA resource policy applies except as specified in the subsections below."
    tags: [Medicaid, resources, APA exceptions, ADLTC]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 A. REASONABLE COMPATIBILITY"
    summary: "Defines the reasonable compatibility standard for reconciling client-stated resources against Asset Verification System (AVS) electronic data when determining Medicaid resource eligibility."
    tags: [reasonable compatibility, resources, AVS, IEVS, eligibility verification]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 B. COMMUNITY SPOUSE RESOURCE ALLOWANCE"
    summary: "Allows transfer of resources from the institutionalized Long Term Care spouse to the community spouse to meet the Medicaid resource limit under the Special Long Term Care category."
    tags: [community spouse, resource allowance, Long Term Care, spousal impoverishment]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 C. CONDITIONAL BENEFITS"
    summary: "The APA conditional benefits policy does not apply to Medicaid, which does not provide conditional benefits."
    tags: [conditional benefits, Medicaid, APA exceptions, resource policy]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 D. PROPERTY FOR SALE"
    summary: "The APA property-for-sale exemption does not apply to Medicaid-only determinations, as Medicaid has no exemption for property up for sale."
    tags: [property for sale, Medicaid, resource exemption, APA exceptions]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 E. TRANSFER OF RESOURCES"
    summary: "The APA transfer-of-resources policy does not apply to Medicaid-only determinations; Medicaid transfer-of-asset rules for institutional or waiver applicants apply instead."
    tags: [transfer of resources, Medicaid, transfer of assets, institutional care]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 F. INSTITUTIONAL ALLOTMENT OF RESOURCES"
    summary: "The APA spousal financial responsibility policy does not apply to institutional or waiver applicants; Medicaid-specific spousal resource eligibility and allotment rules govern instead."
    tags: [resource allotment, institutional care, spousal resources, APA exceptions]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 G. INSTITUTIONALIZED INDIVIDUALS WITH SUBSTANTIAL HOME EQUITY"
    summary: "The APA blanket home exemption regardless of value does not apply to institutional or waiver Long Term Care applicants; substantial home equity limits apply."
    tags: [home equity, institutional care, resource exemption, Long Term Care]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 H. PROMISSORY NOTES, LOANS, AND PROPERTY AGREEMENTS"
    summary: "For transfer-of-asset purposes, the APA promissory notes and loans policy does not apply to institutional or waiver applicants; Medicaid non-allowable transfer provisions apply."
    tags: [promissory notes, loans, transfer of assets, institutional care]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 I. LIFE ESTATES"
    summary: "For transfer-of-asset purposes, the APA life estates policy does not apply to institutional or waiver applicants; Medicaid transfer-of-asset penalty provisions apply."
    tags: [life estates, transfer of assets, institutional care, Medicaid]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "### 524 J. RESOURCE LIMIT FOR THE WORKING DISABLED BUY-IN CATEGORY"
    summary: "The standard APA resource limit does not apply to the Working Disabled Buy-In Medicaid category, which has its own separate resource limit."
    tags: [Working Disabled Buy-In, resource limit, Medicaid, APA exceptions]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 K. INDIVIDUAL INDIAN MONEY ACCOUNTS"
    summary: "Funds in IIM accounts are excluded as resources for Medicaid; once removed from the account, those funds become countable resources."
    tags: [Individual Indian Money, IIM, resource exclusion, Alaska Native]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 L. ALASKA NATIVE AND AMERICAN INDIAN REAL PROPERTY RESOURCE EXCLUDED"
    summary: "All real property in Alaska owned by an Alaska Native or American Indian is excluded from countable resources and transfer-of-asset penalties, including land inherited by non-Native relatives."
    tags: [Alaska Native, American Indian, real property, resource exclusion]

  - path: "input/policy_docs/adltc_manual/524 MEDICAID EXCEPT TO RESOURCE.md"
    heading: "## 524 M. DINGELL ACT LANDS"
    summary: "Up to 160 acres received by certain Alaska Native veterans under the Dingell Act who served between 1964 and 1971 is an exempt resource."
    tags: [Dingell Act, Alaska Native, land, resource exclusion, veterans]

  - path: "input/policy_docs/adltc_manual/Addendum 1 - Expanded Refuse Cash Income Limits.md"
    heading: "## EXPANDED REFUSED CASH INCOME LIMITS"
    summary: "Provides the annual income limit table for the Expanded Refuse Cash program by household type for the ADLTC Medicaid program (2024–2026)."
    tags: [Expanded Refuse Cash, income limits, household type, ADLTC, program standards]

  - path: "input/policy_docs/apa_manual/441/441 COUNTABLE INCOME.md"
    heading: "## 441 COUNTABLE INCOME"
    summary: "Introduces the APA chapter on countable income types, noting that deemed income from spouses and alien sponsors is addressed in chapter 460."
    tags: [countable income, APA, income eligibility, deeming]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "## 441-1 EARNED INCOME"
    summary: "Defines earned income types counted for APA eligibility, including wages, flexible health benefits, sick leave, garnishments, self-employment income, and sheltered workshop earnings."
    tags: [earned income, APA, wages, self-employment, income types]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 A. WAGES"
    summary: "Wages include salaries, commissions, bonuses, severance pay, and other special employment payments, counted in the month of receipt."
    tags: [wages, earned income, employment, income counting]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 B. FLEXIBLE HEALTH BENEFITS"
    summary: "Only the benefit contribution excess above mandatory health insurance paid by an employer as flexible health benefits is counted as income to the employee."
    tags: [flexible health benefits, employer benefits, income exclusion, earned income]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "## 441-1 C. SICK LEAVE"
    summary: "Sick leave paid within six months of work stoppage due to sickness or disability counts as earned income; sick leave received after six months counts as unearned income."
    tags: [sick leave, earned income, unearned income, disability]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 D. GARNISHMENTS AGAINST EARNED INCOME"
    summary: "Wages withheld from earned income to satisfy a debt or legal obligation count as earned income for APA purposes."
    tags: [garnishments, earned income, wage withholding, debt]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 E. NET EARNINGS FROM SELF-EMPLOYMENT"
    summary: "Net self-employment income is gross income less allowable deductions (50% standard or actual costs), averaged over the taxable year and divided by 12 for a monthly figure."
    tags: [self-employment, net income, business expenses, income calculation]

  - path: "input/policy_docs/apa_manual/441/441-1 EARNED INCOME.md"
    heading: "### 441-1 F. EARNINGS FROM SHELTERED WORKSHOP OR WORK ACTIVITIES CENTER"
    summary: "Payments for services performed in a sheltered workshop or work activities center designed to support self-sufficiency are counted as earned income."
    tags: [sheltered workshop, work activities, earned income, disability employment]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "## 441-2 UNEARNED INCOME"
    summary: "Defines unearned income types counted for APA eligibility, covering Social Security, annuities, VA payments, workers' compensation, unemployment, death benefits, awards, gifts, prizes, inheritances, support, rental income, royalties, joint accounts, and retroactive payments."
    tags: [unearned income, APA, income types, eligibility]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 A. BENEFITS PAID UNDER TITLE II OF THE SOCIAL SECURITY ACT"
    summary: "RSDI monthly benefits, including the Medicare Part B premium deducted from the RSDI payment, count as unearned income."
    tags: [Social Security, RSDI, unearned income, Medicare Part B]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 B. ANNUITIES, PENSIONS, RETIREMENT, OR DISABILITY PAYMENTS"
    summary: "Annuities, pensions, retirement benefits, and disability benefits (except early accident disability payments within six months) count as unearned income."
    tags: [annuities, pensions, retirement, disability benefits, unearned income]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 C. DEPARTMENT OF VETERANS AFFAIRS PAYMENTS"
    summary: "VA compensation and pension payments are countable unearned income, with special rules for needs-based payments, educational benefits, clothing allowances, augmented dependent portions, and unusual medical expense increases."
    tags: [Veterans Affairs, VA payments, unearned income, needs-based, educational benefits]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 D. INCOME BASED ON NEED"
    summary: "Needs-based income funded by federal or private agencies using income as an eligibility factor (e.g., BIA GA, SSI, refugee assistance) counts as unearned income, and the $20 general exclusion does not apply."
    tags: [needs-based income, SSI, BIA, unearned income, income exclusion]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 E. WORKERS' COMPENSATION PAYMENTS"
    summary: "Workers' compensation payments for job-related injury count as unearned income, except portions designated for medical, legal, or other expenses of obtaining the award."
    tags: [workers' compensation, unearned income, injury, income exclusion]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 F. UNEMPLOYMENT INSURANCE BENEFITS"
    summary: "Unemployment insurance benefits, including supplemental payments by unions or employers, count as unearned income."
    tags: [unemployment insurance, unearned income, unemployment compensation]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 G. DEATH BENEFITS"
    summary: "Death benefits (life insurance proceeds, lump-sum SSA benefits, inheritances, and related cash gifts) count as income only to the extent they exceed the deceased's last illness and burial expenses."
    tags: [death benefits, life insurance, burial expenses, unearned income]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 H. AWARDS"
    summary: "Court or arbitration awards are counted as unearned income in the month received, less any portion designated as reimbursement for medical, legal, or other expenses."
    tags: [awards, court settlement, unearned income, income exclusion]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 I. CASH GIFTS"
    summary: "Cash gifts are countable unearned income, though small infrequent or irregular gifts may qualify for exclusion under the $60/quarter infrequent income limit."
    tags: [cash gifts, unearned income, infrequent income, income exclusion]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 J. PRIZES"
    summary: "Cash prizes from contests, lotteries, or games of chance are unearned income counted only in the month received; gambling losses are not offset against winnings."
    tags: [prizes, gambling, bingo, unearned income, lottery]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 K. INHERITANCE"
    summary: "Cash inheritances are unearned income in the month received; property inheritances are treated as in-kind support (not income) but become a countable resource the following month."
    tags: [inheritance, unearned income, in-kind support, resource]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 L. SUPPORT AND ALIMONY PAYMENTS"
    summary: "Support and alimony payments provided for the individual's own needs count as unearned income; child support for a child in the home is not countable income to the APA recipient."
    tags: [support, alimony, child support, unearned income]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 M. RENTAL INCOME"
    summary: "Net rental income (gross rent less ordinary and necessary expenses) counts as unearned income unless the recipient actively manages rentals as a self-employment business."
    tags: [rental income, net rental, unearned income, self-employment]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "## 441-2 N. HOME OWNER INCOME FROM ROOM RENTAL"
    summary: "Income from renting a room in the owner's own home is determined by prorating allowable household expenses based on the ratio of rented rooms to total rooms."
    tags: [room rental, home owner, rental income, income calculation]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 O. ROYALTIES"
    summary: "Royalty payments are unearned income unless connected to publication of the individual's own work or received as part of a trade or business, in which case they are earned income."
    tags: [royalties, unearned income, self-employment, copyright]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 P. DEPOSITS MADE TO A JOINT ACCOUNT"
    summary: "Deposits made to a joint account by non-APA co-owners are income to the APA recipient, with exceptions for dual APA/SSI holders and documented non-ownership claims."
    tags: [joint accounts, deposits, unearned income, resource ownership]

  - path: "input/policy_docs/apa_manual/441/441-2 UNEARNED INCOME.md"
    heading: "### 441-2 Q. RETROACTIVE PAYMENTS"
    summary: "Retroactive benefit payments (except retroactive SSI and RSDI benefits) count as income in the month of receipt."
    tags: [retroactive payments, unearned income, SSI, RSDI]

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "## 442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH"
    summary: "Describes income exclusions applicable to both earned and unearned income: infrequent/irregular income, the $20 general monthly exclusion, and income set aside for an approved self-support plan."
    tags: [income exclusions, earned income, unearned income, APA]

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "### 442-1 A. INFREQUENT/IRREGULAR INCOME"
    summary: "Infrequent or irregular income is excluded up to $30 per quarter for earned income and $60 per quarter for unearned income, applied before the $20 general exclusion."
    tags: [infrequent income, irregular income, income exclusion, quarterly limit]

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "### 442-1 B. $20 PER MONTH GENERAL INCOME EXCLUSION"
    summary: "The first $20 per month of non-needs-based income is excluded from income, applied first to unearned income then to earned income; not allowed against needs-based income or in nursing home eligibility."
    tags: [$20 general exclusion, income exclusion, unearned income, earned income]

  - path: "input/policy_docs/apa_manual/442/442-1 INCOME EXCLUSIONS WHICH APPLY TO BOTH.md"
    heading: "### 442-1 C. AMOUNT TO FULFILL A PLAN FOR ACHIEVING SELF-SUPPORT"
    summary: "Earned or unearned income needed to fulfill an SSA- or DVR-approved plan for achieving self-support is excluded from income."
    tags: [self-support plan, income exclusion, SSA, vocational rehabilitation]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "## 442-2 EARNED INCOME EXCLUSIONS"
    summary: "Lists all earned income exclusions for APA eligibility, applied sequentially: federal law exclusions, EITC/Child Tax Credit, infrequent/irregular, student earnings, $20 general, $65 monthly, impairment work expenses, one-half of remaining, blind work expenses, and self-support plan."
    tags: [earned income exclusions, APA, income calculation, eligibility]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 A. EARNED INCOME EXCLUSIONS AUTHORIZED BY FEDERAL LAWS"
    summary: "Earned income exclusions specifically authorized by federal law are excluded; see section 442-3A for the complete enumerated list."
    tags: [federal law, income exclusions, earned income, legal authority]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 B. EARNED INCOME TAX CREDIT AND CHILD TAX CREDIT PAYMENTS"
    summary: "Advance or refund EITC and Child Tax Credit payments are excluded from income regardless of the tax year involved."
    tags: [EITC, Child Tax Credit, income exclusion, tax refund]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 C. INFREQUENT/IRREGULAR EARNED INCOME"
    summary: "Up to $30 of infrequent or irregular earned income per calendar quarter may be excluded."
    tags: [infrequent income, irregular income, earned income, quarterly exclusion]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 D. STUDENT EARNED INCOME EXCLUSION"
    summary: "Earned income of a blind or disabled student under age 22 in regular school attendance is excluded subject to monthly and annual dollar limits that are updated annually."
    tags: [student earnings, blind, disabled, income exclusion, education]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 E. $20 PER MONTH GENERAL INCOME EXCLUSION"
    summary: "Any unused portion of the $20 general income exclusion not already applied against unearned income is applied to earned income; allowed only once per couple."
    tags: [$20 general exclusion, earned income, income exclusion, couple]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 F. $65 EARNED INCOME EXCLUSION"
    summary: "A flat $65 per month is excluded from earned income; allowed only once to a couple even if both members have earned income."
    tags: [$65 exclusion, earned income, monthly exclusion, couple]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 G. IMPAIRMENT RELATED WORK EXPENSES FOR DISABLED"
    summary: "Earned income used to pay impairment-related work expenses (transportation, equipment, attendant care) that are necessary for a disabled individual to work is excluded."
    tags: [impairment work expenses, IRWE, disabled, earned income exclusion]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 H. ONE-HALF OF REMAINING EARNED INCOME"
    summary: "One-half of any remaining earned income after all prior exclusions have been applied is excluded from countable earned income."
    tags: [one-half exclusion, earned income, income calculation, APA]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 I. WORK EXPENSES FOR THE BLIND"
    summary: "Any earned income used for work expenses by a blind individual is excluded, covering a broader range of expenses than the IRWE exclusion available to other disabled individuals."
    tags: [blind work expenses, earned income exclusion, blindness, work expenses]

  - path: "input/policy_docs/apa_manual/442/442-2 EARNED INCOME EXCLUSIONS.md"
    heading: "### 442-2 J. AMOUNT TO FULFILL A PLAN FOR ACHIEVING SELF-SUPPORT"
    summary: "Earned income used to fulfill an approved self-support plan is excluded from income; full policy is at section 442-1C."
    tags: [self-support plan, earned income exclusion, SSA, vocational rehabilitation]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "## 442-3 UNEARNED INCOME EXCLUSIONS"
    summary: "Lists income exclusions applicable only to unearned income, including federally mandated exclusions, needs-based assistance, tax refunds, disaster assistance, dividends, foster care payments, burial funds, home energy assistance, child support, and deposits made on behalf of another."
    tags: [unearned income exclusions, APA, federal exclusions, income calculation]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 A. INCOME EXCLUSIONS AUTHORIZED BY FEDERAL LAWS"
    summary: "Enumerates federally mandated unearned income exclusions covering volunteer payments, Older Americans Act assistance, federal housing assistance, relocation payments, education assistance, ANCSA payments, Indian tribal payments, WWII restitution, Agent Orange settlements, domestic travel tickets, victims' compensation, Nazi persecution payments, energy employees compensation, radiation exposure fund, IDAs, POW payments, Ricky Ray Relief Fund, and spina bifida benefits."
    tags: [federal income exclusions, ANCSA, education assistance, tribal payments, special payments]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 B. CERTAIN ASSISTANCE BASED ON NEED"
    summary: "State or tribal needs-based assistance programs wholly funded by a state, political subdivision, or Indian tribe (e.g., General Relief Assistance, Alaska Senior Benefits) are excluded from countable income."
    tags: [needs-based assistance, GRA, Alaska Senior Benefits, income exclusion]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 C. REFUNDS OF TAX PAID ON REAL PROPERTY OR FOOD"
    summary: "Refunds from any public agency of taxes paid on real property or food purchases are excluded from income."
    tags: [tax refund, property tax, food tax, income exclusion]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 D. DISASTER ASSISTANCE"
    summary: "Assistance received under the Stafford Act or other federal statute due to a presidentially declared major disaster, including interest earned on retained funds, is excluded from income."
    tags: [disaster assistance, Stafford Act, FEMA, income exclusion]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 E. DIVIDENDS AND INTEREST"
    summary: "Dividends and interest earned on countable resources are excluded from income; treatment of dividends on excluded resources depends on the nature of the underlying exclusion."
    tags: [dividends, interest, income exclusion, countable resources]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 F. FOSTER CARE PAYMENTS AND ADOPTION PAYMENTS"
    summary: "Foster care and adoption assistance payments from public or private non-profit agencies are income to the child placed in the home, not to the foster or adoptive parent."
    tags: [foster care, adoption assistance, income exclusion, child income]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 G. INCREASE IN VALUE OF BURIAL FUNDS"
    summary: "Interest accumulation and appreciation on excluded burial funds are excluded from income."
    tags: [burial funds, income exclusion, interest, resource exclusion]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 H. HOME ENERGY ASSISTANCE"
    summary: "Needs-based home energy assistance provided by a state/federally certified non-profit or government entity is excluded from income."
    tags: [home energy assistance, LIHEAP, income exclusion, needs-based]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "### 442-3 I. CHILD SUPPORT PAYMENTS FROM AN ABSENT PARENT"
    summary: "One-third of child support received from an absent parent by or for a child eligible for SSI or APA is excluded from the child's countable income."
    tags: [child support, absent parent, income exclusion, SSI, APA]

  - path: "input/policy_docs/apa_manual/442/442-3 UNEARNED INCOME EXCLUSIONS.md"
    heading: "## 442-3 J. DEPOSITS MADE TO A BANK ACCOUNT ON BEHALF OF ANOTHER PERSON"
    summary: "Money deposited into an individual's bank account that the individual acts as agent to disburse on behalf of another party is not counted as income to that individual."
    tags: [bank deposits, agent, income exclusion, third-party funds]

  - path: "input/policy_docs/apa_manual/442/442-4 THE ORDER IN WHICH INCOME EXCLUSIONS ARE APPLIED.md"
    heading: "## 442-4 THE ORDER IN WHICH INCOME EXCLUSIONS ARE APPLIED"
    summary: "Specifies the sequential order (10 steps) in which earned income exclusions are applied for APA eligibility determination, from federal law exclusions through the self-support plan exclusion."
    tags: [income exclusion order, APA, earned income, eligibility calculation]

  - path: "input/policy_docs/apa_manual/Addendum 1 PROGRAM STANDARDS.md"
    heading: "# Addendum 1"
    summary: "Provides annual program standards tables for APA, including Substantial Gainful Activity limits, Student Earned Income Exclusion monthly and annual limits, SSI payment standards by living arrangement, and APA need/maximum payment standards by household type (2023–2026)."
    tags: [program standards, payment standards, SGA, SSI, APA, household types]
