  Applicant.training_no_shop_hours_per_week:
    kind: input
    type: float
    location: facts.Applicant.training_no_shop_hours_per_week
    depends_on: []
    used_by:
    - is_regular_school_attendance
  Applicant.student_earned_income:
    kind: input
    type: money
    location: facts.Applicant.student_earned_income
