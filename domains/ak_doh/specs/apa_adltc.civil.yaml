# APA / ADLTC Income Eligibility — CIVIL DSL Module
# Translated from: input/policy_docs/AK_DOH_APA_ADLTC.md
# Primary authority: Alaska APA Manual §441-1, §442-2, §523B; ADLTC Addendum 1

module: "eligibility.apa_adltc"
description: "Alaska APA/ADLTC earned income eligibility — exclusion chain and refused cash income limit test (effective 01/01/2026)"
version: "2026Q1"
jurisdiction:
  level: state
  country: US
  state: AK

effective:
  start: 2026-01-01

# =============================================================================
# FACTS — Input Schema
# =============================================================================

facts:
  Applicant:
    description: "An individual applying for APA cash assistance or ADLTC Medicaid"
    fields:
      household_type:
        type: enum
        values: [A1E, B1E, H1E, A2S, B2S, H2S, A2C, B2C, H2C, NHR]
        description: "Household type code determining the income limit (e.g., A1E = Program A, individual eligible; NHR = Nursing Home Regular)"

      is_blind:
        type: bool
        optional: true
        description: "True if the applicant is blind — qualifies for the broad blind work expense exclusion (§442-2I)"

      is_disabled:
        type: bool
        optional: true
        description: "True if the applicant is disabled — qualifies for impairment-related work expense exclusion (§442-2G)"

      is_student:
        type: bool
        optional: true
        description: "True if the applicant is blind or disabled, under age 22, and regularly attending school (§442-2D)"

      gross_earned_income:
        type: money
        currency: USD
        description: "Total gross monthly earned income before any exclusions — wages, net self-employment, sick leave, sheltered workshop payments (§441-1)"

      general_exclusion_used_on_unearned:
        type: money
        currency: USD
        optional: true
        description: "Portion of the $20/month general income exclusion already applied against unearned income this month; remainder applies to earned income (§442-2E)"

      infrequent_irregular_excluded:
        type: money
        currency: USD
        optional: true
        description: "Infrequent or irregular earned income excluded this quarter (caseworker-determined; up to $30/quarter per §442-2C)"

      student_earned_excluded:
        type: money
        currency: USD
        optional: true
        description: "Student earned income excluded per §442-2D — monthly amount after applying Addendum 1 caps (caseworker-determined; caps not in source doc)"

      irwe_amount:
        type: money
        currency: USD
        optional: true
        description: "Verified impairment-related work expenses for disabled applicants (§442-2G)"

      blind_work_expenses:
        type: money
        currency: USD
        optional: true
        description: "Verified work expenses for blind applicants — broader category than IRWE, any work expense allowed (§442-2I)"

      pass_exclusion:
        type: money
        currency: USD
        optional: true
        description: "Earned income excluded to fulfill an approved Plan for Achieving Self-Support (§442-2J)"

      dol_monthly_income_avg:
        type: money
        currency: USD
        optional: true
        description: "DOL-reported gross earned income — most recent quarter divided by 3, before exclusions (§523B reasonable compatibility check)"

# =============================================================================
# DECISIONS — Output Schema
# =============================================================================

decisions:
  eligible:
    type: bool
    default: false
    description: "Whether the applicant passes the APA/ADLTC earned income eligibility test"

  denial_reasons:
    type: list
    item: Reason
    default: []
    description: "Reasons for ineligibility (empty if eligible)"

# =============================================================================
# TABLES — 2026 Refused Cash Income Limits
# =============================================================================
# Source: ADLTC Manual Addendum 1, effective 01/01/2026
# http://dpaweb.hss.state.ak.us/manuals/adltc/adltc.htm#t=addenda%2Faddendum_1.htm

tables:
  refused_cash_income_limits:
    description: "Maximum monthly countable income by household type — income above this limit results in refused (denied) cash aid (effective 01/01/2026)"
    key: [household_type]
    value: [max_monthly_income]
    rows:
      - { household_type: "A1E",  max_monthly_income: 1845 }
      - { household_type: "B1E",  max_monthly_income: 1845 }
      - { household_type: "H1E",  max_monthly_income: 1845 }
      - { household_type: "A2S",  max_monthly_income: 2732 }
      - { household_type: "B2S",  max_monthly_income: 2732 }
      - { household_type: "H2S",  max_monthly_income: 2732 }
      - { household_type: "A2C",  max_monthly_income: 2732 }
      - { household_type: "B2C",  max_monthly_income: 2732 }
      - { household_type: "H2C",  max_monthly_income: 2732 }
      - { household_type: "NHR",  max_monthly_income: 1845 }

# =============================================================================
# CONSTANTS
# =============================================================================

constants:
  GENERAL_INCOME_EXCLUSION: 20           # §442-2E: $20/month general income exclusion (once per couple)
  EARNED_INCOME_EXCLUSION: 65            # §442-2F: $65/month earned income exclusion (once per couple)
  EARNED_INCOME_HALF_RATE: 0.5           # §442-2H: one-half of remaining earned income is excluded
  INFREQUENT_QUARTERLY_MAX: 30           # §442-2C: up to $30/quarter excluded for infrequent/irregular income
  SELF_EMPLOYMENT_DEDUCTION_RATE: 0.50   # §441-1E: 50% standard deduction for gross self-employment income
  REASONABLE_COMPATIBILITY_TOLERANCE: 0.10  # §523B: DOL income must be within 10% of client-stated countable income

# =============================================================================
# COMPUTED — Earned Income Exclusion Chain (CIVIL v2)
# =============================================================================
# Exclusion order: pre-chain exclusions → $20 general → $65 earned → IRWE/BWE → 50% remainder
# Standard chain derived from §442-2E–H and the §523B worked example.

computed:

  refused_cash_income_limit:
    type: money
    currency: USD
    description: "Maximum allowable monthly countable income for this household type (ADLTC Addendum 1 table, 01/01/2026 column)"
    expr: "table('refused_cash_income_limits', Applicant.household_type).max_monthly_income"
    review:
      extraction_fidelity: 4
      source_clarity: 3
      logic_complexity: 2
      policy_complexity: 3
      notes: "Table values are explicitly stated for the 01/01/2026 column. However, the source doc presents three date columns; the 2026 column is assumed current. The relationship between this table and the exclusion chain is not stated in one place — inferred from §523B context."

  general_exclusion_remaining:
    type: money
    currency: USD
    description: "Portion of the $20 general income exclusion not yet applied against unearned income — available to offset earned income this month (§442-2E)"
    expr: "max(GENERAL_INCOME_EXCLUSION - Applicant.general_exclusion_used_on_unearned, 0)"
    review:
      extraction_fidelity: 4
      source_clarity: 3
      logic_complexity: 2
      policy_complexity: 2
      notes: "§442-2E explicitly states 'any portion which has not been excluded from unearned income' applies to earned income. The max(..., 0) floor is implied (cannot have a negative exclusion) but not stated."

  income_after_pre_chain_exclusions:
    type: money
    currency: USD
    description: "Earned income after removing infrequent/irregular, student, and PASS exclusions — feeds into the standard $20/$65/50% chain"
    expr: "max(Applicant.gross_earned_income - Applicant.infrequent_irregular_excluded - Applicant.student_earned_excluded - Applicant.pass_exclusion, 0)"
    review:
      extraction_fidelity: 3
      source_clarity: 2
      logic_complexity: 2
      policy_complexity: 3
      notes: "§442-2C, §442-2D, and §442-2J each specify their exclusions, but the source doc does not explicitly order them relative to the $20/$65/50% chain. Ordering as pre-chain exclusions is inferred from standard SSI exclusion sequence. Student Addendum 1 monthly/yearly caps are not in the source doc — student_earned_excluded is a caseworker-determined input with caps applied upstream."

  income_after_general_exclusion:
    type: money
    currency: USD
    description: "Earned income after applying the remaining $20 general income exclusion (§442-2E)"
    expr: "max(income_after_pre_chain_exclusions - general_exclusion_remaining, 0)"
    review:
      extraction_fidelity: 4
      source_clarity: 4
      logic_complexity: 1
      policy_complexity: 2
      notes: "§442-2E explicitly provides the rule; §523B worked example shows 'Subtract $20' as the first step. The §442-2E note that the exclusion is 'allowed only once to a couple' is captured by treating gross_earned_income as the combined couple figure."

  income_after_earned_exclusion:
    type: money
    currency: USD
    description: "Earned income after the $65 earned income exclusion (§442-2F)"
    expr: "max(income_after_general_exclusion - EARNED_INCOME_EXCLUSION, 0)"
    review:
      extraction_fidelity: 5
      source_clarity: 5
      logic_complexity: 1
      policy_complexity: 1
      notes: "§442-2F states '$65 per month of any earned income is excluded' verbatim. The §523B worked example also shows 'Subtract $65' explicitly. Direct quote."

  disability_work_exclusion:
    type: money
    currency: USD
    description: "Work expense exclusion: blind work expenses (§442-2I) if blind, otherwise IRWE (§442-2G) if disabled — zero if neither applies"
    conditional:
      if: "Applicant.is_blind"
      then: "Applicant.blind_work_expenses"
      else: "Applicant.irwe_amount"
    review:
      extraction_fidelity: 3
      source_clarity: 3
      logic_complexity: 2
      policy_complexity: 3

  income_after_disability_work_exclusion:
    type: money
    currency: USD
    description: "Earned income after deducting disability or blindness work expenses (§442-2G / §442-2I)"
    expr: "max(income_after_earned_exclusion - disability_work_exclusion, 0)"
    review:
      extraction_fidelity: 3
      source_clarity: 3
      logic_complexity: 1
      policy_complexity: 2

  countable_earned_income:
    type: money
    currency: USD
    description: "Final countable earned income — all exclusions applied, including the one-half exclusion (§442-2H)"
    expr: "income_after_disability_work_exclusion * EARNED_INCOME_HALF_RATE"
    review:
      extraction_fidelity: 5
      source_clarity: 5
      logic_complexity: 1
      policy_complexity: 1
      notes: "§442-2H states 'one-half of any earned income is excluded from the gross amount of any remaining earned income.' The §523B worked example shows 'Subtract one half' as the final step. Direct quote."

  dol_countable_income:
    type: money
    currency: USD
    description: "DOL average monthly income with standard $20/$65/50% exclusion chain applied — used for reasonable compatibility comparison (§523B)"
    expr: "max(Applicant.dol_monthly_income_avg - GENERAL_INCOME_EXCLUSION - EARNED_INCOME_EXCLUSION, 0) * EARNED_INCOME_HALF_RATE"
    review:
      extraction_fidelity: 4
      source_clarity: 4
      logic_complexity: 3
      policy_complexity: 3
      notes: "§523B worked example explicitly applies $20, $65, then 50% to the DOL average income. Special exclusions (IRWE, BWE, PASS, student) are not applied to the DOL figure — consistent with the example which uses only the standard chain. The general exclusion is applied in full to DOL income (no unearned-offset split), matching the example's treatment."

  is_dol_reasonably_compatible:
    type: bool
    description: "True if DOL-reported countable income is within 10% of client-stated countable income (§523B)"
    expr: "dol_countable_income <= countable_earned_income * (1 + REASONABLE_COMPATIBILITY_TOLERANCE)"
    review:
      extraction_fidelity: 4
      source_clarity: 3
      logic_complexity: 3
      policy_complexity: 3
      notes: "§523B states 'within 10% of the client stated gross monthly income' but the worked example applies exclusions first; interpreted as DOL countable ≤ client countable × 1.10. Only the upper-bound direction is tested because this flag only matters when DOL > client."

# =============================================================================
# RULE SET
# =============================================================================

rule_set:
  name: "ak_apa_adltc_income_eligibility"
  precedence: "deny_overrides_allow"
  description: "APA/ADLTC income eligibility — countable earned income vs. refused cash income limit; DOL reasonable compatibility check"

# =============================================================================
# RULES
# =============================================================================

rules:

  # ---------------------------------------------------------------------------
  # DENY-001: Countable earned income exceeds the refused cash income limit
  # ---------------------------------------------------------------------------
  - id: "AK-APA-DENY-001"
    kind: deny
    priority: 1
    description: "Countable earned income (after all exclusions) exceeds the refused cash income limit for this household type"
    when: "countable_earned_income > refused_cash_income_limit"
    then:
      - add_reason:
          code: "COUNTABLE_INCOME_EXCEEDS_LIMIT"
          message: "Countable monthly earned income after all exclusions exceeds the refused cash income limit for this household type"
          citations:
            - label: "Alaska APA Manual §442-2 / ADLTC Addendum 1"
              url: "http://dpaweb.hss.state.ak.us/manuals/apa/apa.htm#t=442%2F442-2_earned_income_exclusions.htm"
              excerpt: "Any portion of the $20 general income exclusion... $65 per month of any earned income... one-half of any earned income is excluded from the gross amount of any remaining earned income."
    review:
      extraction_fidelity: 3
      source_clarity: 2
      logic_complexity: 2
      policy_complexity: 3
      notes: "The policy never explicitly states 'deny if countable income exceeds the limit.' The deny logic is inferred from the table title 'EXPANDED REFUSED CASH INCOME LIMITS' and §523B comparing exclusion-adjusted income to 'the income standard.' Low source_clarity because the income limit table (ADLTC Addendum 1) and the exclusion chain (APA §442-2) appear in separate manual fragments with no explicit bridge statement."

  # ---------------------------------------------------------------------------
  # DENY-002: DOL income exceeds limit and is not reasonably compatible
  # Applies only when client-stated income is at or below the limit but DOL data
  # is above — §523B case 4. RC failure triggers further verification; modeled
  # as a deny pending that verification.
  # ---------------------------------------------------------------------------
  - id: "AK-APA-DENY-002"
    kind: deny
    priority: 2
    description: "Client-stated income is at or below the limit, but DOL-reported income exceeds the limit and is not within 10% of client-stated (§523B)"
    when: "countable_earned_income <= refused_cash_income_limit && Applicant.dol_monthly_income_avg > 0 && dol_countable_income > refused_cash_income_limit && !is_dol_reasonably_compatible"
    then:
      - add_reason:
          code: "DOL_INCOME_NOT_REASONABLY_COMPATIBLE"
          message: "DOL-reported income exceeds the income limit and is more than 10% above client-stated income — further verification required before approval"
          citations:
            - label: "Alaska ADLTC Manual §523B"
              url: "http://dpaweb.hss.state.ak.us/manuals/adltc/adltc.htm#t=524_medicaid_exceptions_to_apa_resource_policy%2F524_medicaid_except_to_resource.htm"
              excerpt: "To be considered reasonably compatible, income electronically reported by Department of Labor (DOL) must be within 10% of the client stated gross monthly income."
    review:
      extraction_fidelity: 2
      source_clarity: 3
      logic_complexity: 4
      policy_complexity: 3
      notes: "§523B states that when RC fails the caseworker 'must pursue further verification' — not an automatic denial. Modeling as a deny rule is a conservative interpretation; a caseworker may still approve with additional evidence. Low extraction_fidelity because the policy does not say 'deny if not reasonably compatible.' High logic_complexity from combining four conditions: client ≤ limit, DOL data present, DOL > limit, and DOL outside 10% band."

  # ---------------------------------------------------------------------------
  # ALLOW-001: Applicant passes the income eligibility test
  # ---------------------------------------------------------------------------
  - id: "AK-APA-ALLOW-001"
    kind: allow
    priority: 100
    description: "Applicant passes the APA/ADLTC earned income eligibility test"
    when: "true"
    then:
      - set:
          eligible: true
      - add_reason:
          code: "INCOME_ELIGIBLE"
          message: "Countable monthly earned income is at or below the refused cash income limit for this household type"
          citations:
            - label: "Alaska APA Manual §442-2 / ADLTC Addendum 1"
              url: "http://dpaweb.hss.state.ak.us/manuals/apa/apa.htm#t=442%2F442-2_earned_income_exclusions.htm"
              excerpt: "..."
    review:
      extraction_fidelity: 2
      source_clarity: 2
      logic_complexity: 1
      policy_complexity: 1
      notes: "The policy never states a default-approve rule explicitly. Allow logic is inferred from the 'refused' framing — income below the limit is implicitly approved. Structural allow rule per CIVIL convention."
