    used_by:
    - passes_net_test
    - FED-SNAP-DENY-002
    description: Net monthly income after all allowable deductions (7 CFR § 273.9)
  gross_limit:
    kind: computed
    type: money
    location: computed.gross_limit
    depends_on:
    - Household.household_size
    - GROSS_INCOME_INCREMENT_9PLUS
    - gross_income_limits
    used_by:
    - passes_gross_test
    - FED-SNAP-DENY-001
    description: Gross income limit for this household size (with size 9+ formula
      per 7 CFR § 273.9(a)(1))
  net_limit:
    kind: computed
    type: money
    location: computed.net_limit
    depends_on:
    - Household.household_size
    - NET_INCOME_INCREMENT_9PLUS
    - net_income_limits
    used_by:
    - passes_net_test
    - FED-SNAP-DENY-002
    description: Net income limit for this household size (with size 9+ formula per
      7 CFR § 273.9(a)(2))
  passes_gross_test:
    kind: computed
    type: bool
    location: computed.passes_gross_test
    depends_on:
    - Household.gross_monthly_income
    - is_exempt_household
    - gross_limit
    used_by: []
    description: Whether household passes the gross income test (exempt households
      always pass)
  passes_net_test:
    kind: computed
    type: bool
    location: computed.passes_net_test
    depends_on:
    - net_income
    - net_limit
    used_by: []
    description: Whether household passes the net income test
  FED-SNAP-DENY-001:
    kind: rule
    rule_kind: deny
    location: rules[FED-SNAP-DENY-001]
    depends_on:
    - Household.has_elderly_member
    - Household.has_disabled_member
    - Household.gross_monthly_income
    - gross_limit
    used_by: []
  FED-SNAP-DENY-002:
    kind: rule
    rule_kind: deny
    location: rules[FED-SNAP-DENY-002]
    depends_on:
    - net_income
    - net_limit
    used_by: []
  FED-SNAP-ALLOW-001:
    kind: rule
    rule_kind: allow
    location: rules[FED-SNAP-ALLOW-001]
