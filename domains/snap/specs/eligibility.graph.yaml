  earned_income_deduction:
    kind: computed
    type: money
    location: computed.earned_income_deduction
    depends_on:
    - Household.earned_income
    - EARNED_INCOME_DEDUCTION_RATE
    used_by:
    - income_after_prior_deductions
    description: 20% earned income deduction (7 CFR § 273.9(b))
  standard_deduction:
    kind: computed
    type: money
    location: computed.standard_deduction
    depends_on:
    - Household.household_size
    - standard_deductions
    used_by:
    - income_after_prior_deductions
    description: Standard deduction by household size (7 CFR § 273.9(c)) — size 7+
      same as size 6
  dependent_care_deduction:
    kind: computed
    type: money
    location: computed.dependent_care_deduction
    depends_on:
    - Household.dependent_care_costs
    used_by:
    - income_after_prior_deductions
