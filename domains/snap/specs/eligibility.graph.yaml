    - is_exempt_household
    - shelter_excess
    - SHELTER_DEDUCTION_CAP
    used_by:
    - net_income
    description: Shelter deduction — capped at $744 unless elderly/disabled (7 CFR
      § 273.9(d)(6))
  net_income:
    kind: computed
    type: money
    location: computed.net_income
    depends_on:
    - income_after_prior_deductions
